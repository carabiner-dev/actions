name: 'Sign Attestation'
author: "carabiner-dev"
description: 'Signs an in-toto statement or predicate using bnd'
branding:
  icon: 'edit-3'
  color: 'green'

inputs:
  json-path:
    description: 'Path to the JSON file to sign'
    required: true
  output:
    description: 'Path to the output JSONL file. Attestations are appended if the file already exists.'
    required: true
  is-predicate:
    description: 'Treat the input JSON as a predicate instead of an in-toto statement'
    required: false
    default: 'false'
  subject:
    description: 'Subject for the predicate (required when is-predicate is true)'
    required: false
    default: ''
  predicate-type:
    description: 'Predicate type URI (required when is-predicate is true)'
    required: false
    default: ''
  bnd-version:
    description: 'Version of bnd to install'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - uses: carabiner-dev/actions/install/bnd@174f1c83779af3d3d7e451b7ead7ba824d0d2aa9 # v1.2.2
      name: Install bnd
      with:
        version: ${{ inputs.bnd-version }}
      if: ${{ inputs.bnd-version != '' }}

    - uses: carabiner-dev/actions/install/bnd@174f1c83779af3d3d7e451b7ead7ba824d0d2aa9 # v1.2.2
      name: Install bnd (latest)
      if: ${{ inputs.bnd-version == '' }}

    - name: Validate predicate inputs
      if: ${{ inputs.is-predicate == 'true' }}
      shell: bash
      run: |
        if [ -z "${INPUTS_SUBJECT}" ]; then
          echo "::error::subject is required when is-predicate is true"
          exit 1
        fi
        if [ -z "${INPUTS_PREDICATE_TYPE}" ]; then
          echo "::error::predicate-type is required when is-predicate is true"
          exit 1
        fi
      env:
        INPUTS_SUBJECT: ${{ inputs.subject }}
        INPUTS_PREDICATE_TYPE: ${{ inputs.predicate-type }}

    - name: Sign statement
      if: ${{ inputs.is-predicate != 'true' }}
      shell: bash
      run: |
        ATTESTATION=$(bnd statement "${INPUTS_JSON_PATH}")
        if [ -f "${INPUTS_OUTPUT}" ]; then
          echo "$ATTESTATION" >> "${INPUTS_OUTPUT}"
        else
          echo "$ATTESTATION" > "${INPUTS_OUTPUT}"
        fi
      env:
        INPUTS_JSON_PATH: ${{ inputs.json-path }}
        INPUTS_OUTPUT: ${{ inputs.output }}

    - name: Sign predicate
      if: ${{ inputs.is-predicate == 'true' }}
      shell: bash
      run: |
        ATTESTATION=$(bnd predicate --subject="${INPUTS_SUBJECT}" --type="${INPUTS_PREDICATE_TYPE}" "${INPUTS_JSON_PATH}")
        if [ -f "${INPUTS_OUTPUT}" ]; then
          echo "$ATTESTATION" >> "${INPUTS_OUTPUT}"
        else
          echo "$ATTESTATION" > "${INPUTS_OUTPUT}"
        fi
      env:
        INPUTS_SUBJECT: ${{ inputs.subject }}
        INPUTS_PREDICATE_TYPE: ${{ inputs.predicate-type }}
        INPUTS_JSON_PATH: ${{ inputs.json-path }}
        INPUTS_OUTPUT: ${{ inputs.output }}
