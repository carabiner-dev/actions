# [!] Build notice:
# Note that this installer downloads and builds vexflow at head. This
# will be replaced with a verified installer soon.

name: setup scorecard from source
author: carabiner-dev
description: 'Builds scorecard from source and sets it up in the runner environment'
branding:
  icon: 'download-cloud'
  color: 'green'
inputs:
  install-dir:
    description: 'Path to install the scorecard binary'
    required: false
    default: '$HOME/.carabiner'
runs:
  using: "composite"
  steps:
      - name: Validate install-dir
        shell: bash
        run: |
          case "$INPUTS_INSTALL_DIR" in
            ''|*[!A-Za-z0-9._/\$~-]*)
              echo "::error::install-dir must be non-empty and contain only [A-Za-z0-9._/\$~-]; got: $INPUTS_INSTALL_DIR"
              exit 1
              ;;
          esac
        env:
          INPUTS_INSTALL_DIR: ${{ inputs.install-dir }}

      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          repository: ossf/scorecard
          path: '.build/scorecard/'
          ref: main

      - name: Set up Go
        uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version-file: '.build/scorecard/go.mod'
          cache: false
          check-latest: true

      - name: Build
        shell: bash
        run: |
          mkdir -p ${INPUTS_INSTALL_DIR}/bin || :
          cd .build/scorecard && go build -o ${INPUTS_INSTALL_DIR}/bin/scorecard .
          cd - 
          rm -rf .build/scorecard
        env:
          INPUTS_INSTALL_DIR: ${{ inputs.install-dir }}

      - if: ${{ runner.os == 'Linux' || runner.os == 'macOS' }}
        run: echo "${INPUTS_INSTALL_DIR}/bin" >> $GITHUB_PATH # zizmor: ignore[github-env] install-dir validated upstream
        shell: bash
        env:
          INPUTS_INSTALL_DIR: ${{ inputs.install-dir }}
      - if: ${{ runner.os == 'Windows' }}
        run: echo "${INPUTS_INSTALL_DIR}/bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append # zizmor: ignore[github-env] install-dir validated upstream
        shell: bash
        env:
          INPUTS_INSTALL_DIR: ${{ inputs.install-dir }}
      
      - shell: bash
        run: scorecard version
