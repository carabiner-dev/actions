name: setup unpack
author: carabiner-dev
description: 'Installs the Carabiner unpack dependency analyzer to the runner environment'
branding:
  icon: 'download-cloud'
  color: 'green'
inputs:
  install-dir:
    description: 'Path to install the binary'
    required: false
    default: '$HOME/.carabiner'
  version:
    description: 'Unpack version to install'
    required: false
    default: 'v0.2.1'
runs:
  using: "composite"
  steps:
    - uses: carabiner-dev/actions/install/download-and-verify@be6b4fa42fa3a8432416475d74218b9aa51ea527
      with:
        tool: unpack
        version: ${{ inputs.version }}
        install-dir: ${{ inputs.install-dir }}
        attestation-file: unpack-${{ inputs.version }}.provenance.json
