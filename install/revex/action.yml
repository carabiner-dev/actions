name: setup revex
author: carabiner-dev
description: 'Installs the OpenVEX revex document fixer into the runner'
branding:
  icon: 'download-cloud'
  color: 'green'
inputs:
  install-dir:
    description: 'Path to install the binary'
    required: false
    default: '$HOME/.carabiner'
  version:
    description: 'revex version to install'
    required: false
    default: 'v0.0.1'
runs:
  using: "composite"
  steps:
      # - name: Checkout code
      #   uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      #   with:
      #     persist-credentials: false
      #     repository: carabiner-dev/revex
      #     path: '.build/revex/'
      #     ref: main

      # - name: Set up Go
      #   uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
      #   with:
      #     go-version-file: '.build/revex/go.mod'
      #     cache: false
      #     check-latest: true

      # - name: Build
      #   shell: bash
      #   run: |
      #     mkdir -p ${{ inputs.install-dir }}/bin || :
      #     cd .build/revex && go build -o ${{ inputs.install-dir }}/bin/revex .
      #     cd - 
      #     rm -rf .build/revex
      - name: Detect platform
        id: platform
        shell: bash
        run: |
          OS="${{ runner.os }}"
          ARCH="${{ runner.arch }}"

          case "$OS" in
            Linux)  os="linux" ;;
            macOS)  os="darwin" ;;
            Windows) os="windows" ;;
            *) echo "::error::Unsupported OS: $OS"; exit 1 ;;
          esac

          case "$ARCH" in
            X64)   arch="amd64" ;;
            ARM64) arch="arm64" ;;
            *) echo "::error::Unsupported architecture: $ARCH"; exit 1 ;;
          esac

          ext=""
          if [ "$os" = "windows" ]; then
            ext=".exe"
          fi

          echo "filename=revex-${{ inputs.version }}-${os}-${arch}${ext}" >> "$GITHUB_OUTPUT"
          echo "ext=${ext}" >> "$GITHUB_OUTPUT"

      - name: Install revex
        shell: bash
        run: |
          mkdir -p ${{ inputs.install-dir }}/bin || :
          curl -Lo ${{ inputs.install-dir }}/bin/revex${{ steps.platform.outputs.ext }} https://github.com/carabiner-dev/revex/releases/download/${{ inputs.version }}/${{ steps.platform.outputs.filename }}
          chmod 0755 ${{ inputs.install-dir }}/bin/revex${{ steps.platform.outputs.ext }}

      - if: ${{ runner.os == 'Linux' || runner.os == 'macOS' }}
        run: echo "${{ inputs.install-dir }}/bin" >> $GITHUB_PATH
        shell: bash
      - if: ${{ runner.os == 'Windows' }}
        run: echo "${{ inputs.install-dir }}/bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh

      - shell: bash
        run: revex --help
