name: setup policyctl
author: carabiner-dev
description: 'Installs the Carabiner policyctl AMPEL policy manager to the runner environment'
branding:
  icon: 'download-cloud'
  color: 'green'
inputs:
  install-dir:
    description: 'Path to install the binary'
    required: false
    default: '$HOME/.carabiner'
  version:
    description: 'policyctl version to install'
    required: false
    default: 'v0.1.0'
runs:
  using: "composite"
  steps:
    - uses: carabiner-dev/actions/install/download-and-verify@e0e3b8149dafed833431095bc148d50e7eade4e8 # v1.2.0
      with:
        tool: policyctl
        version: ${{ inputs.version }}
        install-dir: ${{ inputs.install-dir }}
        attestation-file: policyctl-${{ inputs.version }}.provenance.json
