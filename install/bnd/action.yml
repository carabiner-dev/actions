name: setup bnd
author: carabiner-dev
description: 'Installs the Carabiner bnd attester into the runner environment'
branding:
  icon: 'download-cloud'
  color: 'green'
inputs:
  install-dir:
    description: 'Path to install the binary'
    required: false
    default: '$HOME/.carabiner'
  version:
    description: 'bnd version to install'
    required: false
    default: 'v0.4.4'
runs:
  using: "composite"
  steps:
    - uses: carabiner-dev/actions/install/download-and-verify@be6b4fa42fa3a8432416475d74218b9aa51ea527
      with:
        tool: bnd
        version: ${{ inputs.version }}
        install-dir: ${{ inputs.install-dir }}
