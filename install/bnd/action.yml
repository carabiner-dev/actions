name: setup bnd
author: carabiner-dev
description: 'Installs the Carabiner bnd attester into the runner environment'
branding:
  icon: 'download-cloud'
  color: 'green'
inputs:
  install-dir:
    description: 'Path to install the binary'
    required: false
    default: '$HOME/.carabiner'
  version:
    description: 'bnd version to install'
    required: false
    default: 'v0.4.2'
runs:
  using: "composite"
  steps:
    - uses: carabiner-dev/actions/install/download-and-verify@2a11d59a135c5e291f305f249a92ad7903e3ee0f # v1.1.7
      with:
        tool: bnd
        version: ${{ inputs.version }}
        install-dir: ${{ inputs.install-dir }}
