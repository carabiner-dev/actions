name: setup beaker
author: carabiner-dev
description: 'Installs the Carabiner beaker test attester into the runner environment'
branding:
  icon: 'download-cloud'
  color: 'green'
inputs:
  install-dir:
    description: 'Path to install the binary'
    required: false
    default: '$HOME/.carabiner'
  version:
    description: 'beaker version to install'
    required: false
    default: 'v0.1.2'
runs:
  using: "composite"
  steps:
    - if: ${{ runner.os == 'Windows' }}
      shell: bash
      run: |
        echo "::error::beaker does not have a Windows binary"
        exit 1
    - uses: carabiner-dev/actions/install/download-and-verify@be6b4fa42fa3a8432416475d74218b9aa51ea527
      with:
        tool: beaker
        version: ${{ inputs.version }}
        install-dir: ${{ inputs.install-dir }}
