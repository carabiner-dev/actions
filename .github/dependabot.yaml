---
version: 2
updates:
  - package-ecosystem: "github-actions"  # zizmor: ignore[dependabot-cooldown] disabled for now
    directories:
      - "drop"
      - "install/*"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    groups:
      actions:
        update-types:
          - "minor"
          - "patch"
