name: Test Installer Actions

on:
  pull_request:
    branches: [main]

jobs:
  test-install:
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, macos-latest, windows-latest]
        tool: [ampel, bnd, beaker, revex, snappy, unpack]
        exclude:
          # beaker has no Windows binary
          - runner: windows-latest
            tool: beaker
          # unpack builds from source with Go, skip Windows
          - runner: windows-latest
            tool: unpack
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./install/${{ matrix.tool }}

      - name: Verify binary runs
        shell: bash
        run: ${{ matrix.tool }} --help
