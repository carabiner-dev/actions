name: Test Actions

on:
  pull_request:
    branches: [main]

jobs:
  test-installers:
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, macos-latest, windows-latest]
        tool: [ampel-bootstrap, ampel, bnd, beaker, revex, snappy, unpack]
        exclude:
          # beaker has no Windows binary
          - runner: windows-latest
            tool: beaker
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - if: matrix.tool == 'ampel-bootstrap'
        id: bootstrap
        uses: ./install/ampel-bootstrap
      - if: matrix.tool == 'ampel'
        uses: ./install/ampel
      - if: matrix.tool == 'bnd'
        uses: ./install/bnd
      - if: matrix.tool == 'beaker'
        uses: ./install/beaker
      - if: matrix.tool == 'revex'
        uses: ./install/revex
      - if: matrix.tool == 'snappy'
        uses: ./install/snappy
      - if: matrix.tool == 'unpack'
        uses: ./install/unpack

      - if: matrix.tool == 'ampel-bootstrap'
        name: Verify bootstrap binary runs
        shell: bash
        run: ${{ steps.bootstrap.outputs.ampel-path }} version

      - if: matrix.tool != 'ampel-bootstrap'
        name: Verify binary runs
        shell: bash
        run: ${{ matrix.tool }} --help

  test-ampel-verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download bnd binary as test subject
        shell: bash
        run: |
          curl -sSfL -o /tmp/bnd \
            "https://github.com/carabiner-dev/bnd/releases/download/v0.4.1/bnd-v0.4.1-linux-amd64"

      - name: Verify bnd with ampel/verify
        uses: ./ampel/verify
        with:
          subject: /tmp/bnd
          collector: https://github.com/carabiner-dev/bnd/releases/download/v0.4.1/attestations.jsonl
          policy: "git+https://github.com/carabiner-dev/policies#slsa/has-attestation.json"
          attest: "false"
