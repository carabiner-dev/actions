---
# Optional --key/--context flags are built as bash arrays for safe quoting.
name: 'Verify Policy'
author: "carabiner-dev"
description: 'Verifies a subject against a policy'
branding:
  icon: 'award'
  color: 'green'
inputs:
  policy:
    description: Don't attempt to find and apply security policies
    required: true
  subject:
    description: 'Path to a file or hash (algo:value) to use as verification subject'
    required: true
  collector:
    description: 'Collector to load to read attestations'
    required: true
  attest:
    description: 'Attest the policy evaluation results'
    required: false
    default: "true"
  attest-format:
    description: 'Format of the results attestation'
    required: false
    default: "ampel"
  results-path:
    description: "Path to store the results attestation"
    required: false
    default: "ampel.intoto.json"
  push-attestation:
    description: 'Pushes the attestation to the GitHub attestations store'
    required: false
    default: "false"
  attestation:
    description: 'Comma separated list of attestations to ingest'
    required: false
    default: ""
  signer:
    description: 'Comma separated list of signer identity slugs'
    required: false
    default: ""
  key:
    description: 'Path to a key file to use for verification'
    required: false
    default: ""
  keydata:
    description: 'Raw key material to use for verification'
    required: false
    default: ""
  context:
    description: 'Contextual values to pass to the policy (e.g. "key=value,key2=value2")'
    required: false
    default: ""
  fail:
    description: 'Fail the workflow if the policy fails'
    required: false
    default: "true"
  ampel-version:
    description: 'AMPEL version to install and run the verification with. Defaults to the version shipped by the ampel installer.'
    required: false
    default: ''
runs:
  using: composite
  steps:
    # When ampel-version is set, pass it through; otherwise install with no
    # version so install/ampel applies its own default. This keeps the AMPEL
    # version in a single place (install/ampel's version input default, which
    # the automation bump workflow maintains) instead of duplicating it here.
    - if: ${{ inputs.ampel-version == '' }}
      name: 🔴🟡🟢 AMPEL Setup
      uses: carabiner-dev/actions/install/ampel@619a474b2178d06ccf274349397cd67a7802a4fe
    - if: ${{ inputs.ampel-version != '' }}
      name: 🔴🟡🟢 AMPEL Setup (pinned)
      uses: carabiner-dev/actions/install/ampel@619a474b2178d06ccf274349397cd67a7802a4fe
      with:
        version: ${{ inputs.ampel-version }}

    - id: attest-check
      shell: bash
      run: |
        ATTEST="${INPUTS_ATTEST}"
        if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
          echo "::notice::Attestation disabled: no token available for workflow_dispatch events"
          ATTEST="false"
        fi
        echo "attest=${ATTEST}" >> "$GITHUB_OUTPUT"
      env:
        INPUTS_ATTEST: ${{ inputs.attest }}

    - id: verify
      shell: bash
      run: |
        key_flags=()
        ctx_flags=()

        if [ -n "${INPUTS_CONTEXT}" ]; then
          ctx_flags=(--context "${INPUTS_CONTEXT}")
        fi

        if [ -n "${INPUTS_KEY}" ]; then
          key_flags+=(--key="${INPUTS_KEY}")
        fi

        if [ -n "${INPUTS_KEYDATA}" ]; then
          KEYDATA_FILE=$(mktemp)
          printf '%s\n' "${INPUTS_KEYDATA}" > "${KEYDATA_FILE}"
          key_flags+=(--key="${KEYDATA_FILE}")
        fi

        ampel verify \
          --subject="${INPUTS_SUBJECT}" \
          --collector="${INPUTS_COLLECTOR}" \
          --policy="${INPUTS_POLICY}" \
          --exit-code="${INPUTS_FAIL}" \
          --attest-results="${STEPS_ATTEST_CHECK_OUTPUTS_ATTEST}" \
          --attest-format="${INPUTS_ATTEST_FORMAT}" \
          --results-path="${INPUTS_RESULTS_PATH}" \
          --attestation="${INPUTS_ATTESTATION}" \
          --signer="${INPUTS_SIGNER}" \
          "${key_flags[@]}" \
          "${ctx_flags[@]}" \
          --format="html" >> "$GITHUB_STEP_SUMMARY"

        if [ -n "${KEYDATA_FILE:-}" ]; then
          rm -f "${KEYDATA_FILE}"
        fi
      env:
        INPUTS_CONTEXT: ${{ inputs.context }}
        INPUTS_KEY: ${{ inputs.key }}
        INPUTS_KEYDATA: ${{ inputs.keydata }}
        INPUTS_SUBJECT: ${{ inputs.subject }}
        INPUTS_COLLECTOR: ${{ inputs.collector }}
        INPUTS_POLICY: ${{ inputs.policy }}
        INPUTS_FAIL: ${{ inputs.fail }}
        STEPS_ATTEST_CHECK_OUTPUTS_ATTEST: ${{ steps.attest-check.outputs.attest }}
        INPUTS_ATTEST_FORMAT: ${{ inputs.attest-format }}
        INPUTS_RESULTS_PATH: ${{ inputs.results-path }}
        INPUTS_ATTESTATION: ${{ inputs.attestation }}
        INPUTS_SIGNER: ${{ inputs.signer }}

    - if: ${{ steps.attest-check.outputs.attest == 'true' }}
      name: Setup bnd
      uses: carabiner-dev/actions/install/bnd@619a474b2178d06ccf274349397cd67a7802a4fe

    - if: ${{ steps.attest-check.outputs.attest == 'true' }}
      name: sign-ampel-results
      shell: bash
      run: |
        mv "${INPUTS_RESULTS_PATH}" "${INPUTS_RESULTS_PATH}.tmp"
        bnd statement "${INPUTS_RESULTS_PATH}.tmp" >> "${INPUTS_RESULTS_PATH}"
      env:
        INPUTS_RESULTS_PATH: ${{ inputs.results-path }}

    - if: ${{ steps.attest-check.outputs.attest == 'true' && inputs.push-attestation == 'true' }}
      name: Push attestation to artifacts
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: ampel.intoto.json
        path: ${{ inputs.results-path }}
