---
name: 'Run Tests'
author: "carabiner-dev"
description: 'Runs tests and attests the results'
branding:
  icon: 'award'
  color: 'green'
  
inputs:
  dir:
    description: 'Directory to run the test suite'
    required: false
    default: "."
  output:
    description: "Path to write the tests attestation"
    required: false
    default: "tests.intoto.json"
  sign:
    description: "Sign the resulting attestation with the job's workload identity"
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - uses: carabiner-dev/actions/install/beaker@174f1c83779af3d3d7e451b7ead7ba824d0d2aa9 # v1.2.2
      name: Beaker Setup
      id: install

    - uses: carabiner-dev/actions/install/bnd@174f1c83779af3d3d7e451b7ead7ba824d0d2aa9 # v1.2.2
      name: bnd Setup
      id: install-bnd

    - id: run-and-attest
      shell: bash
      run: |
        beaker run \
          --dir="${INPUTS_DIR}" \
          --output="${INPUTS_OUTPUT}.tmp"
      env:
        INPUTS_DIR: ${{ inputs.dir }}
        INPUTS_OUTPUT: ${{ inputs.output }}

    - if: ${{ inputs.sign == 'true' }}
      id: "sign-attestation"
      shell: bash
      run: |
        bnd statement --out="${INPUTS_OUTPUT}" "${INPUTS_OUTPUT}.tmp"
        rm "${INPUTS_OUTPUT}.tmp"
      env:
        INPUTS_OUTPUT: ${{ inputs.output }}

    - if: ${{ inputs.sign != 'true' }}
      id: "set-attestation-name"
      shell: bash
      run: |
        mv "${INPUTS_OUTPUT}.tmp" "${INPUTS_OUTPUT}"
      env:
        INPUTS_OUTPUT: ${{ inputs.output }}
